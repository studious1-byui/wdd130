<!DOCTYPE html>
<html lang="en">

<head>

            <td rowspan="3">Western</td>
            <td>Lacerda</td>
            <td>92-70</td>

        </tr>
        <tr class="filled">
            <td>Acre</td>

        </tr>
        <tr>
            <td>Rondonia</td>

        <tfoot>
            <tr>
                <th colspan="3">Total Players</th>

            </tr>
        </tfoot>
    </table>
</body>

</html>
