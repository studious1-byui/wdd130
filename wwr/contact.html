<body>
    <header>
        <img src="images/z-wwr-blue.jpg" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h3>River Riders White Water Rafting</h3>
        <h4>123 Main River Street</h4>
        <h4>Kolob, California</h4>
        <h4>+1 999 999 9999</h4>
        <h4>info@whitwater.com</h4>
        <div>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d405322.4388050271!2d-113.46477674593814!3d37.47060067068134!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1skolob%2C%20california!5e0!3m2!1sen!2sus!4v1775943163001!5m2!1sen!2sus"

              referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <p>Message Purpose</p>

                <label for="purpose1">General Inquiry</label>
                <input type="radio" id="purpose1" name="purpose1">

                <label for="purpose2">Reservation Question</label>
                <input type="radio" id="purpose2" name="purpose2">

                <label for="purpose3">Website Suggestion</label>
                <input type="radio" id="purpose3" name="purpose3">

                <label for="message">Message</label>
                <textarea>Type here</textarea>

                <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                <input type="checkbox" id="newsletter" name="newsletter">

                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <div class="em-prof">
            <h4>We Are Here to Serve You</h4>

            <div class="profs">
                <img src="employee1.jpg" alt="Employee Profile">
                <img src="employee1.jpg" alt="Employee Profile">
                <img src="employee1.jpg" alt="Employee Profile">
            </div>
        </div>
    </main>
    <footer>
        <div>
            <p>
