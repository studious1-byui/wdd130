<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information for River Riders White Water Rafting</title>
    <meta name="author" content="Scott Christopher Severn">
    <meta name="description" content="This is the Contact Us page for the River Riders
        White Water Rafting page. This page is an assignment for WDD130 Week 05.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-blue.jpg" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h3>River Riders White Water Rafting</h3>
        <h4>123 Main River Street</h4>
        <h4>Kolob, California</h4>
        <h4>+1 999 999 9999</h4>
        <h4>info@whitwater.com</h4>
        <div>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <p>Message Purpose</p>

                <label for="purpose1">General Inquiry</label>
                <input type="radio" id="purpose1" name="purpose1">

                <label for="purpose2">Reservation Question</label>
                <input type="radio" id="purpose2" name="purpose2">

                <label for="purpose3">Website Suggestion</label>
                <input type="radio" id="purpose3" name="purpose3">

                <label for="message">Message</label>
                <textarea>Type here</textarea>

                <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                <input type="checkbox" id="newsletter" name="newsletter">

                <button type="submit">Get in Touch!</button>
            </form>
        </div>
    </main>
    <footer>
        <p>
            &copy; 2026 River Riders White Water Rafting Scott Christopher Severn
        </p>
        <nav class="socialmedia">
            <!-- Placeholder links for now -->
            <a href="https://www.facebook.com">
                <img src="images/facebook.png" alt="Link to facebook">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Link to twitter">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Link to instagram">
            </a>
        </nav>
    </footer>
</body>

</html>
